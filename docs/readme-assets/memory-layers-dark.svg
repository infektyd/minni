  <text x="60" y="150" font-family="&#39;Inter&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="16" font-weight="600" fill="#F4F1EA">Standing principles</text>
  <text x="60" y="168" font-family="&#39;IBM Plex Mono&#39;, ui-monospace, Menlo, monospace" font-size="10.5" fill="#a8a294">durable rules across sessions</text>
  <line x1="320" y1="145" x2="1020" y2="145" stroke="#4ea890" stroke-width="6" stroke-linecap="round"></line>
  <text x="1034" y="149" font-family="&#39;IBM Plex Mono&#39;, ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="0.6" fill="#7cc4ad">LOAD WHOLE</text>
  <text x="60" y="200" font-family="&#39;Inter&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="16" font-weight="600" fill="#F4F1EA">Project state</text>
  <text x="60" y="218" font-family="&#39;IBM Plex Mono&#39;, ui-monospace, Menlo, monospace" font-size="10.5" fill="#a8a294">active branch · open loops · next</text>
  <line x1="320" y1="195" x2="780" y2="195" stroke="#4ea890" stroke-width="6" stroke-linecap="round"></line>
