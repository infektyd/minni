  <text x="60" y="50" font-family="&#39;Inter&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="22" font-weight="680" fill="#F4F1EA" letter-spacing="-0.3">Memory is layered state — not one flat blob.</text>
  <text x="60" y="76" font-family="&#39;IBM Plex Mono&#39;, ui-monospace, Menlo, monospace" font-size="11" fill="#a8a294">each layer has its own load rule  ·  solid bars load whole, dashed bars retrieve on demand</text>
  
  <text x="60" y="100" font-family="&#39;Inter&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="16" font-weight="600" fill="#F4F1EA">Identity</text>
