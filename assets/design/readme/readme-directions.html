<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sovereign Memory · README directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e7e3da; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  .hero-frame, .diag-frame { width: 100%; height: 100%; display: block; }
  /* Crisp text rendering inside SVGs */
  svg text { font-kerning: normal; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hero-variants.jsx"></script>
<script type="text/babel" src="diagrams.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const {
    HeroEditorial, HeroEditorialDark,
    HeroLayers, HeroInspector, HeroSeal, HeroBlueprint,
  } = window;
  const { LayerDiagram, LayerDiagramDark, StatusChips, RehydrationCard } = window;

  function App() {
    return (
      <DesignCanvas title="Sovereign Memory · README directions" subtitle="Hero banners + supporting visuals · 1280-wide, designed as exportable SVG">
        <DCSection id="heroes" title="Hero banners" subtitle="Top-of-README image · 1280 × 320 · light + dark variants pair via <picture>">
          <DCArtboard id="h-editorial" label="1 — Editorial broadsheet (light)" width={1280} height={320}>
            <HeroEditorial />
          </DCArtboard>
          <DCArtboard id="h-editorial-dark" label="1 — Editorial broadsheet (dark)" width={1280} height={320}>
            <HeroEditorialDark />
          </DCArtboard>
          <DCArtboard id="h-layers" label="2 — Memory layers" width={1280} height={320}>
            <HeroLayers />
          </DCArtboard>
          <DCArtboard id="h-inspector" label="3 — Inspector readout" width={1280} height={320}>
            <HeroInspector />
          </DCArtboard>
          <DCArtboard id="h-seal" label="4 — Sovereign seal (minimal)" width={1280} height={320}>
            <HeroSeal />
          </DCArtboard>
          <DCArtboard id="h-blueprint" label="5 — Architectural blueprint" width={1280} height={320}>
            <HeroBlueprint />
          </DCArtboard>
        </DCSection>

        <DCSection id="diagrams" title="Memory-layering diagram" subtitle="Could replace the 'How it works' table · 1280 × 520">
          <DCArtboard id="d-layers-light" label="Layer diagram (light)" width={1280} height={520}>
            <LayerDiagram />
          </DCArtboard>
          <DCArtboard id="d-layers-dark" label="Layer diagram (dark)" width={1280} height={520}>
            <LayerDiagramDark />
          </DCArtboard>
        </DCSection>

        <DCSection id="rehydration" title="Session rehydration card" subtitle="Replaces the ASCII-style code block in 'How it works' · 1280 × 480">
          <DCArtboard id="rehyd" label="Rehydration readout (light)" width={1280} height={480}>
            <RehydrationCard />
          </DCArtboard>
        </DCSection>

        <DCSection id="chips" title="Custom status chips" subtitle="Replace shields.io chips in the status table · stable / beta / alpha / stub">
          <DCArtboard id="chip-set" label="Status chip set" width={1280} height={220}>
            <StatusChips />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
