<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sovereign Memory · README layout directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e7e3da; font-family: 'Inter', system-ui, sans-serif; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="layout-shared.jsx"></script>
<script type="text/babel" src="layout-1-dashboard.jsx"></script>
<script type="text/babel" src="layout-2-narrative.jsx"></script>
<script type="text/babel" src="layout-3-spec.jsx"></script>
<script type="text/babel" src="layout-4-manifesto.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { ReadmeDashboard, ReadmeNarrative, ReadmeSpec, ReadmeManifesto } = window;

  function App() {
    return (
      <DesignCanvas
        title="Sovereign Memory · README layout directions"
        subtitle="Four full-page README mockups · pick one (or mix) to commit to"
      >
        <DCSection
          id="layouts"
          title="README — full-page directions"
          subtitle="Mockups of what the GitHub landing page would look like rendered. Same content, four information architectures."
        >
          <DCArtboard
            id="layout-1-dashboard"
            label="1 · Dashboard — at-a-glance, status-grid centerpiece (honest-engineering tone)"
            width={920} height={1680}
          >
            <ReadmeDashboard animate={true} />
          </DCArtboard>

          <DCArtboard
            id="layout-2-narrative"
            label="2 · Narrative — three-act magazine feature (hybrid tone)"
            width={820} height={1960}
          >
            <ReadmeNarrative />
          </DCArtboard>

          <DCArtboard
            id="layout-3-spec"
            label="3 · Spec sheet — datasheet density (honest-engineering tone)"
            width={920} height={1780}
          >
            <ReadmeSpec />
          </DCArtboard>

          <DCArtboard
            id="layout-4-manifesto"
            label="4 · Manifesto — opinionated, principle-driven (confident tone)"
            width={820} height={1720}
          >
            <ReadmeManifesto />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
