<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>README preview · Sovereign Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/marked@12.0.1/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-2: #f6f8fa;
    --fg: #1f2328;
    --fg-2: #59636e;
    --border: #d1d9e0;
    --link: #0969da;
    --code-bg: rgba(175, 184, 193, 0.2);
    --header-bg: #ffffff;
    --note-bg: #ddf4ff;
    --note-border: #0969da;
    --warn-bg: #fff8c5;
    --warn-border: #9a6700;
    --chrome-bg: #1f2328;
    --chrome-fg: #ffffff;
  }
  :root.dark {
    --bg: #0d1117;
    --bg-2: #151b23;
    --fg: #f0f6fc;
    --fg-2: #9198a1;
    --border: #3d444d;
    --link: #4493f8;
    --code-bg: rgba(101, 108, 118, 0.2);
    --header-bg: #0d1117;
    --note-bg: #121d2f;
    --note-border: #4493f8;
    --warn-bg: #2d2611;
    --warn-border: #d29922;
    --chrome-bg: #f0f6fc;
    --chrome-fg: #0d1117;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; }
  body { transition: background 200ms ease, color 200ms ease; }

  /* Top chrome — mimics github page header */
  header.chrome {
    position: sticky; top: 0; z-index: 10;
    background: var(--chrome-bg); color: var(--chrome-fg);
    padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
  }
  header.chrome .crumbs span { opacity: 0.7; margin: 0 4px; }
  header.chrome .crumbs b { font-weight: 600; }
  header.chrome button {
    background: transparent; color: var(--chrome-fg); border: 1px solid currentColor;
    padding: 4px 10px; border-radius: 6px; font-family: inherit; font-size: 11px;
    letter-spacing: 0.4px; cursor: pointer; opacity: 0.85;
  }
  header.chrome button:hover { opacity: 1; }

  /* Markdown body — approximates github's rendering */
  .markdown-body {
    max-width: 1012px; margin: 0 auto; padding: 32px 56px 80px;
    font-size: 16px; line-height: 1.6;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 {
    line-height: 1.25; margin: 24px 0 16px; font-weight: 600;
  }
  .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .markdown-body h3 { font-size: 1.25em; }
  .markdown-body h4 { font-size: 1em; font-weight: 600; }
  .markdown-body p, .markdown-body ul, .markdown-body ol { margin: 0 0 16px; }
  .markdown-body a { color: var(--link); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
  .markdown-body code {
    background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 6px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 85%;
  }
  .markdown-body pre {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px; overflow: auto; font-family: 'IBM Plex Mono', monospace; font-size: 85%;
    line-height: 1.45;
  }
  .markdown-body pre code { background: transparent; padding: 0; font-size: 100%; }
  .markdown-body blockquote {
    border-left: 3px solid var(--border); padding: 0 16px; color: var(--fg-2); margin: 0 0 16px;
  }
  .markdown-body blockquote.note {
    background: var(--note-bg); border-left-color: var(--note-border); padding: 8px 16px;
  }
  .markdown-body blockquote.warning {
    background: var(--warn-bg); border-left-color: var(--warn-border); padding: 8px 16px;
  }
  .markdown-body table {
    border-collapse: collapse; margin: 0 0 16px; display: block; overflow: auto;
  }
  .markdown-body table th, .markdown-body table td {
    border: 1px solid var(--border); padding: 6px 13px;
  }
  .markdown-body table tr:nth-child(2n) { background: var(--bg-2); }
  .markdown-body img { max-width: 100%; height: auto; }
  .markdown-body details {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 16px; margin: 0 0 16px; background: var(--bg-2);
  }
  .markdown-body details summary {
    cursor: pointer; font-weight: 500; padding: 4px 0;
  }
  .markdown-body details[open] summary { margin-bottom: 12px; }
  .markdown-body sub { font-size: 80%; color: var(--fg-2); }
</style>
</head>
<body>

<header class="chrome">
  <div class="crumbs">
    <b>infektyd</b><span>/</span><b>sovereign-memory</b><span>·</span><span>README preview</span>
  </div>
  <button id="theme-toggle" type="button">toggle theme</button>
</header>

<div class="markdown-body" id="content">Loading…</div>

<script>
  // — Theme toggle ———————————————————————————————
  const root = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const setTheme = (dark) => {
    root.classList.toggle('dark', dark);
    btn.textContent = dark ? '☀ light' : '☾ dark';
  };
  setTheme(window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false);
  btn.addEventListener('click', () => setTheme(!root.classList.contains('dark')));

  // — Render the actual README ——————————————————————
  (async () => {
    const target = document.getElementById('content');
    try {
      const r = await fetch('README.md', { cache: 'no-store' });
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      let md = await r.text();

      // Pull out <picture> blocks and convert to themed <img data-light data-dark>
      md = md.replace(
        /<picture>[\s\S]*?<source[^>]*?srcset="([^"]+)"[^>]*?>[\s\S]*?<img\s+([^>]*?)\s*>[\s\S]*?<\/picture>/g,
        (_, dark, imgAttrs) => {
          const srcMatch = imgAttrs.match(/src="([^"]+)"/);
          const altMatch = imgAttrs.match(/alt="([^"]+)"/);
          const light = srcMatch ? srcMatch[1] : '';
          const alt = altMatch ? altMatch[1] : '';
          return `<img class="themed" data-light="${light}" data-dark="${dark}" src="${light}" alt="${alt}">`;
        }
      );

      // Map GFM alerts to styled blockquotes
      md = md.replace(/> \[!NOTE\]\s*\n((?:> .*\n?)+)/g, (_, body) => {
        const cleaned = body.split('\n').map(l => l.replace(/^> ?/, '')).join('\n');
        return '<blockquote class="note">' + marked.parse(cleaned) + '</blockquote>\n';
      });
      md = md.replace(/> \[!WARNING\]\s*\n((?:> .*\n?)+)/g, (_, body) => {
        const cleaned = body.split('\n').map(l => l.replace(/^> ?/, '')).join('\n');
        return '<blockquote class="warning">' + marked.parse(cleaned) + '</blockquote>\n';
      });

      marked.use({ gfm: true, breaks: false });
      target.innerHTML = marked.parse(md);

      // Wire themed images to follow the theme toggle
      const swapImages = () => {
        const dark = root.classList.contains('dark');
        document.querySelectorAll('img.themed').forEach((img) => {
          img.src = dark ? img.dataset.dark : img.dataset.light;
        });
      };
      swapImages();
      new MutationObserver(swapImages).observe(root, { attributes: true, attributeFilter: ['class'] });
    } catch (e) {
      target.innerHTML = '<h2>Could not load README.md</h2><pre>' + String(e) + '</pre>';
    }
  })();
</script>

</body>
</html>
