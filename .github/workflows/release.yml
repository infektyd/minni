# Release: on a v* tag, gate on the same hermetic smoke CI runs, build the
# distributable artifacts, and attach them to a GitHub Release.
#
# Secrets: none. The pypi job authenticates with an OIDC id-token; the
# trusted publisher is registered on pypi.org (project `minni` → Publishing:
# owner infektyd, repo minni — lowercase, matching GitHub's canonical OIDC
# claim — workflow release.yml, environment pypi). A TestPyPI dry-run lane
# existed briefly but was removed 2026-07-03: no test.pypi.org registration,
# and the v0.2.0 tag publish is proven green end to end. Restore it from git
# history if a rehearsal lane is ever wanted (environment `testpypi`). npm
# publishing stays absent (name taken; PACKAGING_PLAN.md §6.6).
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Gate, build, publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install project deps
        run: make setup

      - name: Release gate — hermetic smoke
        run: bash scripts/repro-smoke.sh

      - name: Release gate — fast check
        run: make check

      - name: Build Python sdist + wheel
        run: |
          .venv/bin/python -m pip install build
          .venv/bin/python -m build --outdir release-artifacts

      - name: Build npm package tarball
        working-directory: plugins/minni
        run: |
          npm run build
          npm pack --pack-destination ../../release-artifacts

      - name: Check tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_V="$(.venv/bin/python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          NPM_V="$(node -p "require('./plugins/minni/package.json').version")"
          test "$TAG" = "$PY_V" || { echo "tag $TAG != engine version $PY_V"; exit 1; }
          test "$TAG" = "$NPM_V" || { echo "tag $TAG != plugin version $NPM_V"; exit 1; }

      - name: Upload Python dist for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          # Only the Python artifacts go to (Test)PyPI; the npm tarball ships
          # on the GitHub Release alone.
          path: |
            release-artifacts/*.whl
            release-artifacts/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Minni $GITHUB_REF_NAME" \
            --generate-notes \
            release-artifacts/*

  # Trusted publishing (PyPI OIDC): no API tokens anywhere. Tag pushes publish
  # to PyPI (environment `pypi`); manual workflow_dispatch runs publish to
  # TestPyPI (environment `testpypi`) as the dry-run.
  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
