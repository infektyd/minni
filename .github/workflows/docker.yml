# Docker eval image: built and smoke-tested in CI on changes to its inputs,
# published to GHCR on version tags. Never built on a maintainer machine
# (PACKAGING_PLAN.md §6.5 — local storage constraint).
#
# Secrets: none beyond the built-in GITHUB_TOKEN (GHCR login), and only on the
# tag-only publish job — PR builds never receive packages:write.
name: Docker

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/minni/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements.lock'
      - '.github/workflows/docker.yml'
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke the eval image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t minni-eval:ci .

      - name: Smoke — daemon starts and answers ping in the container
        run: |
          docker run -d --name minni-smoke minni-eval:ci
          for i in $(seq 1 20); do
            if docker exec minni-smoke python -m minni.minnid_client \
                 --socket /home/minni/.minni/run/minnid.sock ping; then
              echo "daemon answered"; break
            fi
            [ "$i" = 20 ] && { docker logs minni-smoke; exit 1; }
            sleep 3
          done
          docker rm -f minni-smoke

  publish:
    name: Push eval image to GHCR
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build image for publish
        run: docker build -t minni-eval:ci .

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push versioned + latest tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker tag minni-eval:ci "$IMAGE:$VERSION"
          docker tag minni-eval:ci "$IMAGE:latest"
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
