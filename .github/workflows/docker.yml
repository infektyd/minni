# Docker eval image: built and smoke-tested in CI on changes to its inputs,
# published to GHCR on version tags. Never built on a maintainer machine
# (PACKAGING_PLAN.md §6.5 — local storage constraint).
#
# Secrets: none beyond the built-in GITHUB_TOKEN (GHCR login on the publish job).
# Finding 2: PR builds use contents:read only; packages:write is publish-job only;
# checkout never persists credentials into the build context.
name: Docker

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/minni/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements.lock'
      - '.github/workflows/docker.yml'
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke the eval image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t minni-eval:ci .

      - name: Smoke — daemon starts and answers ping in the container
        run: |
          docker run -d --name minni-smoke minni-eval:ci
          for i in $(seq 1 20); do
            if docker exec minni-smoke python -m minni.minnid_client \
                 --socket /home/minni/.minni/run/minnid.sock ping; then
              echo "daemon answered"; break
            fi
            [ "$i" = 20 ] && { docker logs minni-smoke; exit 1; }
            sleep 3
          done
          docker rm -f minni-smoke

      - name: Export image for publish job
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker save minni-eval:ci -o /tmp/minni-eval-ci.tar

      - name: Upload image artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: minni-eval-image
          path: /tmp/minni-eval-ci.tar
          retention-days: 1

  publish:
    name: Push eval image to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: minni-eval-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/minni-eval-ci.tar

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push versioned + latest tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker tag minni-eval:ci "$IMAGE:$VERSION"
          docker tag minni-eval:ci "$IMAGE:latest"
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
