name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbidden-files:
    name: Forbidden Files
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR for forbidden file additions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # File patterns that should never be added to the repo (extended regex).
          PATTERNS=(
            # PR-description scratch (the Jules / agent failure mode that triggered this gate)
            '(^|/)pr_description\.(txt|md)$'
            '(^|/)PR_DESCRIPTION\.(txt|md)$'
            # Generic scratch / temp / backup files
            '\.scratch\.(txt|md)$'
            '\.tmp\.(txt|md|json|ya?ml)$'
            '\.bak$'
            '~$'
            # OS junk
            '(^|/)\.DS_Store$'
            '(^|/)Thumbs\.db$'
            # Secrets — block any .env except .env.example / .env.sample / .env.template
            '(^|/)\.env(\..*)?$'
            # Top-level scratch notes
            '^notes\.(txt|md)$'
            '^TODO\.(txt|md)$'
            '^scratch\.(txt|md)$'
          )

          # Explicit allowlist (matched before the deny patterns).
          ALLOW=(
            '(^|/)\.env\.example$'
            '(^|/)\.env\.sample$'
            '(^|/)\.env\.template$'
          )

          ADDED=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$ADDED" ]; then
            echo "✓ No new files added."
            exit 0
          fi

          echo "Added files in PR:"
          echo "$ADDED" | sed 's/^/  /'
          echo "---"

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            allowed=0
            for a in "${ALLOW[@]}"; do
              if echo "$file" | grep -E -q "$a"; then allowed=1; break; fi
            done
            [ "$allowed" -eq 1 ] && continue
            for p in "${PATTERNS[@]}"; do
              if echo "$file" | grep -E -q "$p"; then
                VIOLATIONS="${VIOLATIONS}  ${file}  (matched: ${p})"$'\n'
                break
              fi
            done
          done <<< "$ADDED"

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::PR hygiene check failed — forbidden files detected:"
            printf '%s' "$VIOLATIONS"
            cat <<'MSG'

            These files should not be committed:
              - PR descriptions belong in the GitHub PR body, not in tracked files.
              - Scratch / temp / backup files belong in your local workspace only.
              - .env files contain secrets — use .env.example as the tracked template.
              - OS junk (.DS_Store, Thumbs.db) belongs in .gitignore.

            Remove these from your branch (git rm + commit + push) and the check
            will re-run automatically.
          MSG
            exit 1
          fi

          echo "✓ No forbidden files in PR diff."
