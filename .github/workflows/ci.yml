name: Public CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-smoke:
    name: Free public cloud smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt pytest pyyaml

      - name: Public boundary guard
        run: |
          bash scripts/check-public-boundary.sh
          bash scripts/check-migrations.sh

      - name: Engine tests
        run: |
          PYTHONPATH=engine python -m pytest engine/ -q --tb=short

      - name: Plugin tests
        working-directory: plugins/sovereign-memory
        run: |
          npm ci
          npm test
          npm audit --audit-level=moderate

      - name: Hermetic smoke (status + recall + isolation)
        run: |
          bash scripts/repro-smoke.sh
