name: Public CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-smoke:
    name: Free public cloud smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Install project deps
        run: |
          make setup
          .venv/bin/python -m pip install pyyaml

      - name: Public boundary guard
        run: |
          bash scripts/check-public-boundary.sh
          bash scripts/check-migrations.sh

      - name: Engine tests
        run: |
          .venv/bin/python -m pytest tests/ -q --tb=short

      - name: Plugin tests
        working-directory: plugins/minni
        run: |
          npm test
          npm audit --audit-level=moderate

      - name: Hermetic smoke (status + recall + isolation)
        run: |
          bash scripts/repro-smoke.sh

      # The newcomer-facing health check must stay truthful: stand up a daemon
      # in an isolated $HOME (same pattern as repro-smoke.sh) and require
      # `minni doctor` to pass against it.
      - name: minni doctor (newcomer health check)
        run: |
          TD="$(mktemp -d /tmp/minnid-doctor-XXXXXX)"
          mkdir -p "$TD/home"
          export HOME="$TD/home" MINNI_HOME="$TD"
          SOCK="$TD/run/minnid.sock"
          .venv/bin/python -u -m minni.minnid --socket "$SOCK" > "$TD/daemon.log" 2>&1 &
          DPID=$!
          trap 'kill "$DPID" 2>/dev/null || true; rm -rf "$TD"' EXIT
          sleep 3
          .venv/bin/minni --socket "$SOCK" doctor || { cat "$TD/daemon.log"; exit 1; }
