name: CI

on:
  push:
    branches: [ main ]  # Phase 0 spec: main + PR + nightly; rc1-phase-012 retained only for dev worktree isolation (not in prod matrix)
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # nightly

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
        node-version: ['20']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Python deps (best effort)
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt || true
          pip install pyyaml || true

      - name: Run engine tests
        run: python -m pytest engine/ -q --tb=no
        # Note: full suite (incl. heavy embedder/FAISS) is best-effort on GHA (no model weights cached);
        # core/principal/frontmatter/handoff/vault + hermetic smoke are the Phase 0 gating signals.
        # Future: add pytest markers + -m "not slow" for stricter signal.

      - name: Install & test plugin
        working-directory: plugins/sovereign-memory
        run: |
          npm ci --prefer-offline || npm ci
          npm test

      - name: Hermetic smoke (status + recall + isolation)
        run: |
          bash scripts/repro-smoke.sh
